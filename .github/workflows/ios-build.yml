name: Build iOS App (AltStore)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build for Device (unsigned)
        working-directory: swift
        run: |
          xcodebuild build \
            -project WeatherDiffApp.xcodeproj \
            -scheme WeatherDiffApp \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            CONFIGURATION_BUILD_DIR=$PWD/build/Release-iphoneos

      - name: Package as IPA
        working-directory: swift
        run: |
          mkdir -p build/Payload
          cp -r build/Release-iphoneos/WeatherDiffApp.app build/Payload/
          cd build
          zip -r WeatherDiffApp.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeatherDiffApp-ipa
          path: swift/build/WeatherDiffApp.ipa
